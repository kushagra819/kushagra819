<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

      .bg { fill: #0d1117; }
      .grid-line { stroke: #21bb85; stroke-width: 0.3; opacity: 0.08; }
      .rain { font-family: 'JetBrains Mono', monospace; font-size: 12px; fill: #21bb85; }
      .name { font-family: 'JetBrains Mono', monospace; font-size: 36px; font-weight: 700; fill: #e6edf3; }
      .name-shadow1 { font-family: 'JetBrains Mono', monospace; font-size: 36px; font-weight: 700; fill: #ff6b6b; }
      .name-shadow2 { font-family: 'JetBrains Mono', monospace; font-size: 36px; font-weight: 700; fill: #21bb85; }
      .role { font-family: 'JetBrains Mono', monospace; font-size: 14px; fill: #21bb85; letter-spacing: 3px; }
      .sub { font-family: 'JetBrains Mono', monospace; font-size: 12px; fill: #c678dd; }
      .prompt { font-family: 'JetBrains Mono', monospace; font-size: 13px; fill: #5c6370; }
      .typed { font-family: 'JetBrains Mono', monospace; font-size: 13px; fill: #e5c07b; }
      .cursor-rect { fill: #21bb85; }
      .stat-num { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; }
      .stat-lab { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #4b5263; letter-spacing: 2px; }
      .stat-box { fill: #161b22; stroke: #21262d; stroke-width: 1; rx: 6; }
      .border-line { stroke: #21262d; stroke-width: 1; fill: none; }
      .pill { fill: rgba(33,187,133,0.1); stroke: rgba(33,187,133,0.35); stroke-width: 1; }
      .pill-text { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #21bb85; letter-spacing: 1px; }
      .dot-pulse { fill: #21bb85; }

      /* Matrix rain columns */
      .r0 { animation: fall0 4.2s linear infinite; }
      .r1 { animation: fall1 3.8s linear infinite 0.5s; }
      .r2 { animation: fall2 5.1s linear infinite 1.2s; }
      .r3 { animation: fall3 4.5s linear infinite 0.3s; }
      .r4 { animation: fall4 3.6s linear infinite 0.9s; }
      .r5 { animation: fall5 4.9s linear infinite 1.8s; }
      .r6 { animation: fall6 3.4s linear infinite 0.1s; }
      .r7 { animation: fall7 5.3s linear infinite 2.1s; }
      .r8 { animation: fall8 4.0s linear infinite 0.7s; }
      .r9 { animation: fall9 3.9s linear infinite 1.5s; }
      .r10 { animation: fall10 4.7s linear infinite 0.4s; }
      .r11 { animation: fall11 3.5s linear infinite 1.1s; }

      @keyframes fall0  { 0%{transform:translateY(-60px);opacity:0} 10%{opacity:0.7} 90%{opacity:0.5} 100%{transform:translateY(420px);opacity:0} }
      @keyframes fall1  { 0%{transform:translateY(-60px);opacity:0} 10%{opacity:0.5} 90%{opacity:0.4} 100%{transform:translateY(420px);opacity:0} }
      @keyframes fall2  { 0%{transform:translateY(-60px);opacity:0} 10%{opacity:0.6} 90%{opacity:0.3} 100%{transform:translateY(420px);opacity:0} }
      @keyframes fall3  { 0%{transform:translateY(-60px);opacity:0} 10%{opacity:0.8} 90%{opacity:0.5} 100%{transform:translateY(420px);opacity:0} }
      @keyframes fall4  { 0%{transform:translateY(-60px);opacity:0} 10%{opacity:0.4} 90%{opacity:0.3} 100%{transform:translateY(420px);opacity:0} }
      @keyframes fall5  { 0%{transform:translateY(-60px);opacity:0} 10%{opacity:0.6} 90%{opacity:0.4} 100%{transform:translateY(420px);opacity:0} }
      @keyframes fall6  { 0%{transform:translateY(-60px);opacity:0} 10%{opacity:0.9} 90%{opacity:0.6} 100%{transform:translateY(420px);opacity:0} }
      @keyframes fall7  { 0%{transform:translateY(-60px);opacity:0} 10%{opacity:0.5} 90%{opacity:0.3} 100%{transform:translateY(420px);opacity:0} }
      @keyframes fall8  { 0%{transform:translateY(-60px);opacity:0} 10%{opacity:0.7} 90%{opacity:0.5} 100%{transform:translateY(420px);opacity:0} }
      @keyframes fall9  { 0%{transform:translateY(-60px);opacity:0} 10%{opacity:0.6} 90%{opacity:0.4} 100%{transform:translateY(420px);opacity:0} }
      @keyframes fall10 { 0%{transform:translateY(-60px);opacity:0} 10%{opacity:0.5} 90%{opacity:0.3} 100%{transform:translateY(420px);opacity:0} }
      @keyframes fall11 { 0%{transform:translateY(-60px);opacity:0} 10%{opacity:0.8} 90%{opacity:0.5} 100%{transform:translateY(420px);opacity:0} }

      /* Glitch on name */
      .glitch-base { animation: none; }
      .glitch-r { animation: glitch-r 4s infinite 2s; }
      .glitch-g { animation: glitch-g 4s infinite 2s; }
      @keyframes glitch-r {
        0%,89%,100% { transform: translate(0,0); opacity: 0; }
        90% { transform: translate(-3px, 1px); opacity: 0.7; }
        92% { transform: translate(3px,-1px); opacity: 0.7; }
        94% { transform: translate(-2px, 2px); opacity: 0.7; }
        96% { transform: translate(0,0); opacity: 0; }
      }
      @keyframes glitch-g {
        0%,89%,100% { transform: translate(0,0); opacity: 0; }
        91% { transform: translate(3px,-2px); opacity: 0.7; }
        93% { transform: translate(-3px,1px); opacity: 0.7; }
        95% { transform: translate(2px,1px); opacity: 0.7; }
        96% { transform: translate(0,0); opacity: 0; }
      }

      /* Typing animation */
      .type-1 { animation: typing1 12s infinite; }
      .type-2 { animation: typing2 12s infinite; }
      .type-3 { animation: typing3 12s infinite; }
      @keyframes typing1 {
        0%,8%   { opacity:1 } 
        25%,100% { opacity:0 }
      }
      @keyframes typing2 {
        0%,25%  { opacity:0 }
        33%,58% { opacity:1 }
        66%,100%{ opacity:0 }
      }
      @keyframes typing3 {
        0%,58%  { opacity:0 }
        66%,91% { opacity:1 }
        100%    { opacity:0 }
      }

      /* Cursor blink */
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      .cursor-rect { animation: blink 1s step-end infinite; }

      /* Pulse dot */
      @keyframes pulse { 0%,100%{r:4px;opacity:1} 50%{r:6px;opacity:0.5} }
      .pdot { animation: pulse 2s ease-in-out infinite; }

      /* Hex glow */
      @keyframes hexglow { 0%,100%{opacity:0.6} 50%{opacity:1} }
      .hexborder { animation: hexglow 3s ease-in-out infinite; }

      /* Stat fade in */
      .s1 { animation: fadein 0.5s ease-out 0.2s both; }
      .s2 { animation: fadein 0.5s ease-out 0.4s both; }
      .s3 { animation: fadein 0.5s ease-out 0.6s both; }
      @keyframes fadein { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

      /* Scan line */
      @keyframes scan { 0%{transform:translateY(0)} 100%{transform:translateY(400px)} }
      .scanline { animation: scan 6s linear infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" class="bg"/>

  <!-- Grid -->
  <g opacity="0.4">
    <line x1="0" y1="40" x2="800" y2="40" class="grid-line"/>
    <line x1="0" y1="80" x2="800" y2="80" class="grid-line"/>
    <line x1="0" y1="120" x2="800" y2="120" class="grid-line"/>
    <line x1="0" y1="160" x2="800" y2="160" class="grid-line"/>
    <line x1="0" y1="200" x2="800" y2="200" class="grid-line"/>
    <line x1="0" y1="240" x2="800" y2="240" class="grid-line"/>
    <line x1="0" y1="280" x2="800" y2="280" class="grid-line"/>
    <line x1="0" y1="320" x2="800" y2="320" class="grid-line"/>
    <line x1="0" y1="360" x2="800" y2="360" class="grid-line"/>
    <line x1="40" y1="0" x2="40" y2="400" class="grid-line"/>
    <line x1="80" y1="0" x2="80" y2="400" class="grid-line"/>
    <line x1="120" y1="0" x2="120" y2="400" class="grid-line"/>
    <line x1="160" y1="0" x2="160" y2="400" class="grid-line"/>
    <line x1="200" y1="0" x2="200" y2="400" class="grid-line"/>
    <line x1="240" y1="0" x2="240" y2="400" class="grid-line"/>
    <line x1="280" y1="0" x2="280" y2="400" class="grid-line"/>
    <line x1="320" y1="0" x2="320" y2="400" class="grid-line"/>
    <line x1="360" y1="0" x2="360" y2="400" class="grid-line"/>
    <line x1="400" y1="0" x2="400" y2="400" class="grid-line"/>
    <line x1="440" y1="0" x2="440" y2="400" class="grid-line"/>
    <line x1="480" y1="0" x2="480" y2="400" class="grid-line"/>
    <line x1="520" y1="0" x2="520" y2="400" class="grid-line"/>
    <line x1="560" y1="0" x2="560" y2="400" class="grid-line"/>
    <line x1="600" y1="0" x2="600" y2="400" class="grid-line"/>
    <line x1="640" y1="0" x2="640" y2="400" class="grid-line"/>
    <line x1="680" y1="0" x2="680" y2="400" class="grid-line"/>
    <line x1="720" y1="0" x2="720" y2="400" class="grid-line"/>
    <line x1="760" y1="0" x2="760" y2="400" class="grid-line"/>
  </g>

  <!-- Scan line effect -->
  <rect class="scanline" x="0" y="-2" width="800" height="2" fill="#21bb85" opacity="0.04"/>

  <!-- LEFT matrix rain -->
  <g opacity="0.15">
    <text class="rain r0"  x="18"  y="0">0</text>
    <text class="rain r1"  x="18"  y="-60">1</text>
    <text class="rain r1"  x="18"  y="-120">∇</text>
    <text class="rain r2"  x="38"  y="-20">λ</text>
    <text class="rain r2"  x="38"  y="-80">0</text>
    <text class="rain r3"  x="58"  y="-10">1</text>
    <text class="rain r3"  x="58"  y="-70">∑</text>
    <text class="rain r4"  x="78"  y="-40">A</text>
    <text class="rain r4"  x="78"  y="-100">I</text>
    <text class="rain r5"  x="98"  y="0">⊕</text>
    <text class="rain r5"  x="98"  y="-60">1</text>
    <text class="rain r6"  x="118" y="-30">0</text>
    <text class="rain r6"  x="118" y="-90">∫</text>
  </g>

  <!-- RIGHT matrix rain -->
  <g opacity="0.15">
    <text class="rain r7"  x="668" y="-15">1</text>
    <text class="rain r7"  x="668" y="-75">λ</text>
    <text class="rain r8"  x="688" y="-35">M</text>
    <text class="rain r8"  x="688" y="-95">L</text>
    <text class="rain r9"  x="708" y="0">0</text>
    <text class="rain r9"  x="708" y="-60">∇</text>
    <text class="rain r10" x="728" y="-20">1</text>
    <text class="rain r10" x="728" y="-80">⊗</text>
    <text class="rain r11" x="748" y="-5">A</text>
    <text class="rain r11" x="748" y="-65">I</text>
    <text class="rain r0"  x="768" y="-45">0</text>
    <text class="rain r0"  x="768" y="-105">1</text>
    <text class="rain r1"  x="788" y="-25">∑</text>
    <text class="rain r1"  x="788" y="-85">≈</text>
  </g>

  <!-- Hex avatar -->
  <g transform="translate(110, 200)">
    <!-- outer hex ring animated -->
    <polygon points="0,-52 45,-26 45,26 0,52 -45,26 -45,-26" 
             fill="none" stroke="url(#hexgrad)" stroke-width="2" class="hexborder" opacity="0.9"/>
    <!-- inner hex -->
    <polygon points="0,-44 38,-22 38,22 0,44 -38,22 -38,-22" fill="#161b22"/>
    <!-- KM text -->
    <text x="0" y="7" text-anchor="middle" font-family="JetBrains Mono,monospace" 
          font-size="22" font-weight="700" fill="#21bb85">KM</text>
    <!-- pulse dot -->
    <circle cx="32" cy="28" r="4" fill="#21bb85" class="pdot"/>
    <circle cx="32" cy="28" r="4" fill="none" stroke="#21bb85" stroke-width="1" opacity="0.4"/>
  </g>

  <defs>
    <linearGradient id="hexgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#21bb85"/>
      <stop offset="100%" style="stop-color:#c678dd"/>
    </linearGradient>
  </defs>

  <!-- NAME with glitch -->
  <g transform="translate(220, 165)">
    <!-- glitch shadow red -->
    <text class="name-shadow1 glitch-r" x="0" y="0">Kushagra Mehta</text>
    <!-- glitch shadow green -->
    <text class="name-shadow2 glitch-g" x="0" y="0">Kushagra Mehta</text>
    <!-- base name -->
    <text class="name glitch-base" x="0" y="0">Kushagra Mehta</text>
  </g>

  <!-- Role line -->
  <text class="role" x="220" y="190">AI · DS · ML ENGINEER · BUILDER</text>

  <!-- Divider -->
  <line x1="220" y1="202" x2="620" y2="202" stroke="#21262d" stroke-width="1"/>

  <!-- Typing prompt -->
  <text class="prompt" x="220" y="225">❯ currently building:</text>

  <!-- Typed words cycling -->
  <g>
    <text class="typed type-1" x="380" y="225">surrogate ML models...</text>
    <text class="typed type-2" x="380" y="225">neural nets from scratch...</text>
    <text class="typed type-3" x="380" y="225">stock prediction algos...</text>
  </g>
  <!-- Cursor -->
  <rect class="cursor-rect" x="574" y="212" width="7" height="14" rx="1"/>

  <!-- Second line -->
  <text class="prompt" x="220" y="248">❯ best_score =</text>
  <text x="336" y="248" font-family="JetBrains Mono,monospace" font-size="13" fill="#21bb85" font-weight="700">R² ≈ 0.96</text>
  <text x="414" y="248" font-family="JetBrains Mono,monospace" font-size="13" fill="#4b5263">  # ANN on distillation col</text>

  <!-- Third line -->
  <text class="prompt" x="220" y="268">❯ university  =</text>
  <text x="336" y="268" font-family="JetBrains Mono,monospace" font-size="13" fill="#c678dd">"TSEC — AI &amp; DS, 2024–28"</text>

  <!-- Divider 2 -->
  <line x1="220" y1="282" x2="620" y2="282" stroke="#21262d" stroke-width="1"/>

  <!-- Stat boxes -->
  <g class="s1">
    <rect x="220" y="294" width="110" height="52" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
    <text x="275" y="316" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="20" font-weight="700" fill="#21bb85">0.96</text>
    <text x="275" y="334" text-anchor="middle" class="stat-lab">BEST R²</text>
  </g>
  <g class="s2">
    <rect x="344" y="294" width="110" height="52" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
    <text x="399" y="316" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="20" font-weight="700" fill="#c678dd">13+</text>
    <text x="399" y="334" text-anchor="middle" class="stat-lab">REPOS</text>
  </g>
  <g class="s3">
    <rect x="468" y="294" width="110" height="52" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
    <text x="523" y="316" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="20" font-weight="700" fill="#e5c07b">2028</text>
    <text x="523" y="334" text-anchor="middle" class="stat-lab">GRADUATING</text>
  </g>

  <!-- Open to work pill -->
  <rect x="220" y="358" width="120" height="22" rx="11" class="pill"/>
  <circle cx="234" cy="369" r="4" fill="#21bb85" class="pdot"/>
  <text x="244" y="373" class="pill-text">OPEN TO WORK</text>

  <!-- Mumbai pill -->
  <rect x="352" y="358" width="100" height="22" rx="11" fill="rgba(97,175,239,0.08)" stroke="rgba(97,175,239,0.3)" stroke-width="1"/>
  <text x="402" y="373" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" fill="#61afef" letter-spacing="1">MUMBAI · IN</text>

  <!-- TSEC pill -->
  <rect x="464" y="358" width="76" height="22" rx="11" fill="rgba(198,120,221,0.08)" stroke="rgba(198,120,221,0.3)" stroke-width="1"/>
  <text x="502" y="373" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" fill="#c678dd" letter-spacing="1">TSEC</text>

  <!-- Border around whole card -->
  <rect x="1" y="1" width="798" height="398" rx="8" fill="none" stroke="#21262d" stroke-width="1.5"/>

  <!-- Corner accents -->
  <polyline points="1,30 1,1 30,1" fill="none" stroke="#21bb85" stroke-width="2"/>
  <polyline points="770,1 799,1 799,30" fill="none" stroke="#21bb85" stroke-width="2"/>
  <polyline points="1,370 1,399 30,399" fill="none" stroke="#21bb85" stroke-width="2"/>
  <polyline points="770,399 799,399 799,370" fill="none" stroke="#21bb85" stroke-width="2"/>
</svg>
